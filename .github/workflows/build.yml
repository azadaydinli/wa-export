name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore "WA Export/WA Export.csproj"

      - name: Publish
        run: |
          dotnet publish "WA Export/WA Export.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o publish

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Package with Velopack
        run: |
          vpk pack `
            --packId "WAExport" `
            --packVersion "1.0.${{ github.run_number }}" `
            --packDir publish `
            --mainExe "WA Export.exe" `
            --packTitle "WA Export" `
            --outputDir releases

      - name: Upload to GitHub Releases
        run: |
          vpk upload github `
            --repoUrl "https://github.com/azadaydinli/wa-export-windows" `
            --publish `
            --releaseName "v1.0.${{ github.run_number }}" `
            --tag "v1.0.${{ github.run_number }}" `
            --token "${{ secrets.GITHUB_TOKEN }}"
