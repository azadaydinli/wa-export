name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore "WA Export/WA Export.csproj"

      - name: Publish
        run: |
          dotnet publish "WA Export/WA Export.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o publish

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Package with Velopack
        run: |
          vpk pack `
            --packId "WAExport" `
            --packVersion "1.0.${{ github.run_number }}" `
            --packDir publish `
            --mainExe "WA Export.exe" `
            --packTitle "WA Export" `
            --outputDir releases

      - name: Update the update channel
        run: |
          gh release delete "update-channel" --yes --cleanup-tag 2>$null; $true
          $nupkgs = Get-ChildItem releases -Filter "*.nupkg" | ForEach-Object { $_.FullName }
          $files = @("releases/RELEASES", "releases/releases.win.json") + $nupkgs
          gh release create "update-channel" @files `
            --prerelease `
            --title "Update Channel" `
            --notes "Internal update channel. Do not download manually."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create user-facing release
        run: |
          $setup = Get-ChildItem releases -Filter "*Setup*" | Select-Object -First 1
          gh release create "v1.0.${{ github.run_number }}" `
            "$($setup.FullName)#WAExport-win-Setup.exe" `
            --title "v1.0.${{ github.run_number }}" `
            --notes "WA Export v1.0.${{ github.run_number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
