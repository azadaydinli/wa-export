name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "version=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $tag = "${{ github.ref_name }}"
            $ver = $tag.TrimStart('v')
            echo "version=$ver" >> $env:GITHUB_OUTPUT
            echo "tag=$tag" >> $env:GITHUB_OUTPUT
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore "WA Export/WA Export.csproj"

      - name: Publish
        run: |
          dotnet publish "WA Export/WA Export.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o publish `
            -p:Version="${{ steps.ver.outputs.version }}"

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Package with Velopack
        run: |
          vpk pack `
            --packId "WAExport" `
            --packVersion "${{ steps.ver.outputs.version }}" `
            --packDir publish `
            --mainExe "WA Export.exe" `
            --packTitle "WA Export" `
            --outputDir releases

      - name: Update the update channel
        run: |
          $nupkgs = Get-ChildItem releases -Filter "*.nupkg" | ForEach-Object { $_.FullName }
          $files = @("releases/RELEASES", "releases/releases.win.json") + $nupkgs
          # Check if release exists
          $null = gh release view "update-channel" 2>&1
          if ($LASTEXITCODE -ne 0) {
            # First time: create with a backdated tag pointing to first commit so it
            # appears at the bottom of the GitHub Releases page
            $firstCommit = git rev-list --max-parents=0 HEAD
            $env:GIT_COMMITTER_DATE = "2020-01-01T00:00:00"
            git tag -a update-channel $firstCommit -m "Update Channel"
            git push origin update-channel
            gh release create "update-channel" @files `
              --prerelease `
              --title "Update Channel" `
              --notes "Internal update channel. Do not download manually."
          } else {
            # Subsequent runs: delete old assets and upload fresh ones
            $rel = gh api "repos/${{ github.repository }}/releases/tags/update-channel" | ConvertFrom-Json
            foreach ($asset in $rel.assets) {
              gh api --method DELETE "repos/${{ github.repository }}/releases/assets/$($asset.id)"
            }
            gh release upload "update-channel" @files
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create user-facing release
        run: |
          $setup = Get-ChildItem releases -Filter "*Setup*" | Select-Object -First 1
          Copy-Item $setup.FullName "releases/waexport_setup.exe"
          gh release create "${{ steps.ver.outputs.tag }}" `
            "releases/waexport_setup.exe" `
            --title "${{ steps.ver.outputs.tag }}" `
            --notes "WA Export ${{ steps.ver.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
