name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add Windows App SDK NuGet source
        run: |
          dotnet nuget add source https://api.nuget.org/v3/index.json --name nuget.org 2>$null || true

      - name: Restore dependencies
        run: dotnet restore "WA Export/WA Export.csproj"

      - name: Publish self-contained exe
        run: |
          dotnet publish "WA Export/WA Export.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WA-Export-Windows
          path: publish/WA Export.exe
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: publish/WA Export.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
